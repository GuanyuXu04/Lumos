seed: 56

data:
  path: Data/Combined_Data
  stride: 3
  train_split: 0.8
  val_split: 0.1

model:
  optical_dim: 180
  latent_dim: 512
  num_points: 4096
  tnet1: false
  tnet2: false

output:
  base_dir: checkpoints
  run_name: default_run

train_ae:
  gpus: auto  # "auto" uses all available GPUs; set to 1 to force single-GPU
  batch_size: 16
  max_epochs: 25
  base_lr: 0.001
  # BN momentum schedule
  bn_init_decay: 0.9
  bn_decay_rate: 0.5
  bn_decay_step: 200000
  bn_decay_clip: 0.5
  early_stop_patience: 20
  num_workers: 4
  loss:
    repulsion_k: 10
    repulsion_h: 0.5
  scheduler:
    factor: 0.2
    patience: 3

train_optical:
  batch_size: 64
  epochs: 500
  lr: 0.001
  early_stop_patience: 20
  num_workers: 4
  # Override to load AE weights from a different run. If null, uses output.run_name.
  ae_run_name: null

ablation:
  repeats: 12     # number of training repetitions per K (different seeds)
  base_seed: 1000 # seeds used are base_seed, base_seed+1, ..., base_seed+repeats-1
